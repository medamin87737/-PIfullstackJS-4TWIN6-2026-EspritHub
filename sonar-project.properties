sonar.projectKey=skillup-tn-fullstack
sonar.projectName=SkillUpTnFrontBack
sonar.sourceEncoding=UTF-8

# Analyse des deux applications
sonar.sources=backend/src,frontend/src
sonar.tests=backend/src,frontend/src

# Reconnaissance des fichiers de tests
sonar.test.inclusions=backend/src/**/*.spec.ts,frontend/src/**/*.test.ts,frontend/src/**/*.test.tsx

# Exclusions habituelles
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.d.ts

# Couverture générée par les pipelines CI
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info,backend/coverage/lcov.info
