# Service Python FastAPI — recommandations (/recommend). Image : Jenkins CD ou build manuel.
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: skillup
  labels:
    app: ai-service
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      name: http
  selector:
    app: ai-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: skillup
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
        - name: ai-service
          image: workapp21/skillup-ai:latest
          ports:
            - containerPort: 8000
          env:
            - name: HF_HOME
              value: /cache/huggingface
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-service-secrets
                  key: ANTHROPIC_API_KEY
          volumeMounts:
            - name: hf-cache
              mountPath: /cache/huggingface
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 15
            failureThreshold: 60
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
      volumes:
        - name: hf-cache
          emptyDir: {}
