# Backend NestJS — image mise à jour par Jenkins CD (docker push puis set image)
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: skillup
  labels:
    app: backend
spec:
  type: NodePort
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30080
      name: http
  selector:
    app: backend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: skillup
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: workapp21/skillup-backend:latest
          ports:
            - containerPort: 3000
          env:
            - name: MONGODB_URI
              value: mongodb://mongo:27017/skillupdb
          # tcpSocket : vérifie que le port écoute (Nest peut être lent au démarrage avec Mongo)
          startupProbe:
            tcpSocket:
              port: 3000
            failureThreshold: 36
            periodSeconds: 5
          readinessProbe:
            tcpSocket:
              port: 3000
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 3000
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 5
          resources:
            requests:
              memory: '256Mi'
              cpu: '100m'
            limits:
              memory: '768Mi'
              cpu: '500m'
