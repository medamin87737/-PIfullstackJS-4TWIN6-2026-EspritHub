# Copie ce fichier vers ai-service-secret.yaml (ne commite JAMAIS la vraie clé)
# ou crée le secret en ligne de commande :
#   kubectl create secret generic ai-service-secrets -n skillup \
#     --from-literal=ANTHROPIC_API_KEY='sk-ant-api03-...'
#
apiVersion: v1
kind: Secret
metadata:
  name: ai-service-secrets
  namespace: skillup
type: Opaque
stringData:
  ANTHROPIC_API_KEY: "CHANGEME"
