services:
  mongo:
    image: mongo:6.0
    container_name: skillup-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  ai-service:
    build: ./ai-service
    container_name: skillup-ai
    restart: always
    ports:
      - "8000:8000"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      - mongo

  backend:
    build: ./backend
    container_name: skillup-backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      MONGODB_URI: mongodb://mongo:27017/skillupdb
      AI_SERVICE_URL: http://ai-service:8000
      AI_FEEDBACK_ENABLED: "true"
    depends_on:
      - mongo
      - ai-service

  # VITE_API_URL = URL vue par le navigateur sur ta machine (pas le hostname Docker "backend")
  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://localhost:3000
    container_name: skillup-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo-data:
